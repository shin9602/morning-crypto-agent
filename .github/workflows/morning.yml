name: 데이터 수집

on:
  schedule:
    - cron: '25 21 * * *'  # 매일 06:25 KST (21:25 UTC)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.0

      - uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install pandas pandas-ta numpy requests yfinance

      - name: 데이터 수집
        run: python collect_data.py

      - name: data.json 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "데이터 업데이트 $(date -u '+%Y-%m-%d')"
          git push
